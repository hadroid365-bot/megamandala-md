name: Build Mega Drive ROM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - Dockerfile.sgdk
      - .github/workflows/build-sgdk-image.yml

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    container:
      image: ghcr.io/hadroid365-bot/sgdk-marsdev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Build ROM
        shell: bash
        run: |
          source /opt/toolchains/mars/mars.sh
          make

      - name: Prepare ROM artifact
        shell: bash
        run: |
          mkdir -p artifact
          cp out/rom.bin artifact/MEGAMANDALA_MD.bin

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: MEGAMANDALA_MD_ROM
          path: artifact/
