name: Build SGDK Container

on:
  workflow_dispatch:
  push:
    paths:
      - Dockerfile.sgdk
      - .github/workflows/build-sgdk-image.yml

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push SGDK image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.sgdk
          push: true
          tags: ghcr.io/hadroid365-bot/sgdk-marsdev:latest
